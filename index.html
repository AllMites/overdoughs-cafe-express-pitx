    <!-- SYSTEM STYLES (Do not edit unless modifying structural layout) -->
    <style>
        /* CSS Variables mapped by JS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #000000;
            --surface-color: #f4f4f4;
            --border-color: #e0e0e0;
            --font-heading: sans-serif;
            --font-body: sans-serif;
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            font-size: 16px;
        }
        h1, h2, h3, h4, .font-heading {
            font-family: var(--font-heading);
            font-weight: 400;
            line-height: 1.2;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; height: auto; display: block; }

        /* Layout Utility */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
        }
        .section { padding: 100px 0; }
        .section-title {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 3rem;
            text-align: center;
            color: var(--text-color);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--bg-color);
            padding: 1rem 2.5rem;
            font-family: var(--font-body);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* Navbar */
        #navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.5rem 0;
            z-index: 100;
            transition: all 0.4s ease;
            color: #ffffff; /* Default light for hero overlay */
        }
        #navbar.scrolled {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Hero */
        #hero {
            height: 100vh;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-size: cover;
            background-position: center;
            text-align: center;
        }
        #hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            color: #ffffff;
            max-width: 800px;
            padding: 0 5%;
        }
        .hero-title {
            font-size: clamp(3.5rem, 8vw, 6.5rem);
            margin-bottom: 1rem;
            font-style: italic;
        }
        .hero-tagline {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            margin-bottom: 2.5rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* About */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }
        .about-image-wrapper { position: relative; }
        .about-image-wrapper::after {
            content: '';
            position: absolute;
            top: -20px; right: -20px; bottom: 20px; left: 20px;
            border: 1px solid var(--accent-color);
            z-index: -1;
        }
        .about-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; }
        .about-text { font-size: 1.1rem; color: var(--text-color); opacity: 0.85; }
        .about-title { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 1.5rem; }

        /* Menu */
        #menu { background-color: var(--surface-color); }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem 4rem;
        }
        .menu-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .menu-item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .menu-item-name { font-size: 1.3rem; }
        .menu-item-price { font-weight: 500; color: var(--accent-color); font-size: 1.1rem;}
        .menu-item-desc { font-size: 0.95rem; opacity: 0.7; }

        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .gallery-item {
            aspect-ratio: 1/1;
            overflow: hidden;
            background-color: var(--surface-color);
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s ease;
        }
        .gallery-item:hover img { transform: scale(1.05); }

        /* Location & Hours */
        .location-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background-color: var(--surface-color);
        }
        .location-content { padding: 4rem 10%; display: flex; flex-direction: column; justify-content: center; }
        .map-container { width: 100%; height: 100%; min-height: 400px; }
        .hours-list { margin: 2rem 0; border-top: 1px solid var(--border-color); }
        .hour-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        .hour-day { font-weight: 500; }
        .contact-details { margin-top: 1rem; }
        .contact-details a, .contact-details p { display: block; margin-bottom: 0.5rem; opacity: 0.8; }

        /* Footer */
        footer {
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 4rem 0 2rem;
            text-align: center;
        }
        .footer-socials { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; }
        .footer-socials a { font-family: var(--font-heading); font-style: italic; font-size: 1.2rem; transition: color 0.3s ease; }
        .footer-socials a:hover { color: var(--accent-color); }
        .footer-copy { font-size: 0.85rem; opacity: 0.6; }

        /* Animations */
        .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .about-grid, .location-grid { grid-template-columns: 1fr; gap: 3rem; }
            .about-image-wrapper::after { display: none; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .location-content { padding: 3rem 5%; }
        }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .menu-grid { grid-template-columns: 1fr; }
            .section { padding: 60px 0; }
        }
    </style>

                menuItem.className = 'menu-item fade-up';
                menuItem.innerHTML = `
                    <div class="menu-item-header">
                        <h3 class="menu-item-name font-heading">${item.name}</h3>
                        <span class="menu-item-price">${item.price}</span>
                    </div>
                    <p class="menu-item-desc">${item.desc}</p>
                `;
                menuGrid.appendChild(menuItem);
            });

            // Gallery
            const galleryGrid = document.getElementById('dom-gallery-grid');
            SITE_CONFIG.gallery.forEach(imgUrl => {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'gallery-item fade-up';
                imgContainer.innerHTML = `<img src="${imgUrl}" alt="Cafe Gallery Image">`;
                galleryGrid.appendChild(imgContainer);
            });

            // Location & Hours
            document.getElementById('dom-location-title').textContent = SITE_CONFIG.locationTitle;
            const hoursList = document.getElementById('dom-hours-list');
            SITE_CONFIG.hours.forEach(hour => {
                const hourEl = document.createElement('div');
                hourEl.className = 'hour-item';
                hourEl.innerHTML = `<span class="hour-day">${hour.day}</span><span class="hour-time">${hour.time}</span>`;
                hoursList.appendChild(hourEl);
            });
            document.getElementById('dom-address').textContent = SITE_CONFIG.contact.address;
            
            const phoneEl = document.getElementById('dom-phone');
            phoneEl.textContent = SITE_CONFIG.contact.phone;
            phoneEl.href = `tel:${SITE_CONFIG.contact.phone.replace(/[^0-9+]/g, '')}`; // Strip spaces for link
            
            document.getElementById('dom-map').innerHTML = SITE_CONFIG.contact.mapIframe;

            // Footer
            document.getElementById('dom-fb').href = SITE_CONFIG.contact.facebook;
            document.getElementById('dom-ig').href = SITE_CONFIG.contact.instagram;
            document.getElementById('dom-footer-copy').textContent = `© ${new Date().getFullYear()} ${SITE_CONFIG.hero.businessName}. All rights reserved.`;

            // 3. Setup Scroll Animations (Intersection Observer)
            const observerOptions = { threshold: 0.1, rootMargin: "0px 0px -50px 0px" };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target); // Only animate once
                    }
                });
            }, observerOptions);

            // Observe all elements with .fade-up
            setTimeout(() => {
                document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
            }, 100);

            // 4. Navbar Scroll Effect
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        });
    </script>





<script id="premium-script">
(function() {
    if (window.__px_init) return;
    window.__px_init = true;

    function init() {
        var root = document.documentElement, body = document.body;
        var cfg = window.SITE_CONFIG || {};
        var isMobile = window.matchMedia('(max-width: 768px)').matches;

        // 1. RGB from SITE_CONFIG
        function hexToRgb(h) {
            if (!h) return '0,0,0';
            h = h.replace('#','');
            if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
            var r = parseInt(h.substring(0,2), 16), g = parseInt(h.substring(2,4), 16), b = parseInt(h.substring(4,6), 16);
            return isNaN(r) ? '0,0,0' : r+','+g+','+b;
        }
        var bg = (cfg.theme && cfg.theme.colors && cfg.theme.colors.background) || '';
        var txt = (cfg.theme && cfg.theme.colors && cfg.theme.colors.text) || '';
        var acc = (cfg.theme && cfg.theme.colors && cfg.theme.colors.accent) || '';
        var surf = (cfg.theme && cfg.theme.colors && cfg.theme.colors.surface) || '';
        var bord = (cfg.theme && cfg.theme.colors && cfg.theme.colors.border) || '';
        root.style.setProperty('--px-accent-rgb', hexToRgb(acc));
        root.style.setProperty('--px-text-rgb', hexToRgb(txt));
        root.style.setProperty('--px-bg-rgb', hexToRgb(bg));
        root.style.setProperty('--px-surface-rgb', hexToRgb(surf));
        root.style.setProperty('--px-border-rgb', hexToRgb(bord));

        // 2. Navbar offset helper
        function getNavOffset() {
            var nav = document.getElementById('navbar');
            return nav ? nav.offsetHeight : 0;
        }
        function smoothScrollTo(target) {
            if (!target) return;
            var top = target.getBoundingClientRect().top + window.pageYOffset - getNavOffset() - 16;
            window.scrollTo({ top: top, behavior: 'smooth' });
        }

        // 3. Hero Canvas Shader (desktop only, paused offscreen)
        var heroEl = document.getElementById('hero') || document.querySelector('header');
        var canvas = null, animId = null, shaderRunning = false;
        function startShader() {
            if (!heroEl || shaderRunning || isMobile) return;
            shaderRunning = true;
            canvas = document.createElement('canvas');
            canvas.id = 'px-shader-canvas';
            heroEl.style.position = heroEl.style.position || 'relative';
            heroEl.insertBefore(canvas, heroEl.firstChild);
            var ctx = canvas.getContext('2d'), time = 0;
            function resize() {
                var rect = heroEl.getBoundingClientRect();
                var dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }
            resize();
            var rgb = hexToRgb(acc).split(',').map(Number);
            var r = rgb[0] || 217, g = rgb[1] || 91, b = rgb[2] || 67;
            function draw() {
                if (!shaderRunning) return;
                time += 0.004;
                var w = canvas.width, h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < 3; i++) {
                    var cx = w * (0.3 + 0.4 * Math.sin(time * 0.7 + i * 2.1));
                    var cy = h * (0.3 + 0.4 * Math.cos(time * 0.6 + i * 1.8));
                    var rad = Math.max(w, h) * (0.55 + 0.15 * Math.sin(time * 0.5 + i));
                    var alpha = 0.06 + 0.04 * Math.sin(time + i);
                    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
                    grad.addColorStop(0, 'rgba('+r+','+g+','+b+','+(alpha*1.6)+')');
                    grad.addColorStop(0.5, 'rgba('+r+','+g+','+b+','+alpha+')');
                    grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
            window.addEventListener('resize', resize);
        }
        function stopShader() {
            shaderRunning = false;
            if (animId) { cancelAnimationFrame(animId); animId = null; }
            if (canvas && canvas.parentNode) { canvas.parentNode.removeChild(canvas); canvas = null; }
        }
        if (!isMobile && heroEl) {
            new IntersectionObserver(function(entries) {
                entries.forEach(function(e) { e.isIntersecting ? startShader() : stopShader(); });
            }, { threshold: 0.05 }).observe(heroEl);
        }

        // 4. Scroll progress
        var progress = document.createElement('div');
        progress.className = 'px-progress';
        body.prepend(progress);
        var ticking = false;
        window.addEventListener('scroll', function() {
            if (!ticking) {
                requestAnimationFrame(function() {
                    var h = document.documentElement.scrollHeight - window.innerHeight;
                    progress.style.width = (h > 0 ? Math.min((window.pageYOffset / h) * 100, 100) : 0) + '%';
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });

        // 5. Grain
        var grain = document.createElement('div');
        grain.className = 'px-grain';
        body.appendChild(grain);

        // 6. Staggered fade-up delays
        setTimeout(function() {
            document.querySelectorAll('.fade-up').forEach(function(el, i) {
                el.style.transitionDelay = (i % 6) * 0.06 + 's';
            });
        }, 200);

        // 7. Smooth scroll (exclude .mobile-nav, .px-dock, .px-sheet)
        document.querySelectorAll('a[href^="#"]').forEach(function(link) {
            if (link.closest('.px-dock') || link.closest('.px-sheet') || link.closest('.mobile-nav')) return;
            link.addEventListener('click', function(e) {
                var target = document.querySelector(this.getAttribute('href'));
                if (target) { e.preventDefault(); smoothScrollTo(target); }
            });
        });

        // 8. Mobile dock
        if (isMobile) {
            var hasMenu = !!document.getElementById('menu');
            var hasPricing = !!document.getElementById('pricing');
            var hasServices = !!document.getElementById('services');
            var hasLocation = !!document.getElementById('location');
            var primarySection = hasMenu ? '#menu' : (hasServices ? '#services' : (hasPricing ? '#pricing' : '#'));
            var primaryLabel = hasMenu ? 'Menu' : (hasServices ? 'Services' : (hasPricing ? 'Prices' : 'Visit'));
            var phone = '+63', phoneHref = 'tel:+63';
            try { if (cfg.contact) { phone = cfg.contact.phone || phone; phoneHref = 'tel:' + phone.replace(/[^0-9+]/g, ''); } } catch(e) {}
            var dock = document.createElement('div');
            dock.className = 'px-dock';
            dock.innerHTML =
                '<a href="' + (hasLocation ? '#location' : '#') + '" class="px-dock-btn">' +
                '<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>Map</a>' +
                '<a href="' + phoneHref + '" class="px-dock-btn">' +
                '<svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>Call</a>' +
                '<a href="' + primarySection + '" class="px-dock-btn px-dock-primary">' + primaryLabel + '</a>' +
                '<a href="#" class="px-dock-btn" id="px-dock-share">' +
                '<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>Share</a>';
            body.appendChild(dock);
                        var sentinel = document.createElement('div');
            var _heroH = heroEl ? heroEl.offsetHeight : window.innerHeight;
            var _sentTop = Math.max(_heroH * 0.55, 400);
            sentinel.style.cssText = 'position:absolute;top:' + _sentTop + 'px;height:1px;width:1px;pointer-events:none';
            body.appendChild(sentinel);
            new IntersectionObserver(function(entries) {
                entries.forEach(function(e) { if (e.isIntersecting) { dock.classList.add('px-dock-visible'); footerEl && footerEl.classList.add('px-has-dock'); } });
            }, { threshold: 0 }).observe(sentinel);
            var footerEl = document.querySelector('footer');
            if (footerEl) {
                new IntersectionObserver(function(entries) {
                    entries.forEach(function(e) {
                        if (e.isIntersecting) dock.classList.remove('px-dock-visible'); body.classList.remove('px-has-dock');
                        else if (window.pageYOffset > window.innerHeight * 0.4) dock.classList.add('px-dock-visible'); footerEl && footerEl.classList.add('px-has-dock');
                    });
                }, { threshold: 0.05 }).observe(footerEl);
            }
            var shareBtn = document.getElementById('px-dock-share');
            if (shareBtn) {
                shareBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (navigator.share) { navigator.share({ title: document.title, url: location.href }).catch(function(){}); }
                    else { navigator.clipboard.writeText(location.href).then(function() {
                        var orig = shareBtn.innerHTML;
                        shareBtn.innerHTML = '<span style="font-size:1.2em">' + String.fromCodePoint(0x2705) + '</span> Copied!';
                        setTimeout(function() { shareBtn.innerHTML = orig; }, 1800);
                    }).catch(function(){}); }
                });
            }
        }

        // 9. Bottom sheet (mobile only, no existing .mobile-nav)
        if (isMobile && !document.querySelector('.mobile-nav')) {
            var sections = [];
            document.querySelectorAll('#navbar a[href^="#"], nav a[href^="#"]').forEach(function(a) {
                var href = a.getAttribute('href'), text = a.textContent.trim();
                if (href && text && href !== '#' && !sections.some(function(s) { return s.href === href; })) {
                    sections.push({ href: href, text: text });
                }
            });
            if (sections.length === 0) {
                document.querySelectorAll('section[id], header[id]').forEach(function(sec) {
                    var id = sec.id, h2 = sec.querySelector('h2');
                    var text = h2 ? h2.textContent.trim() : id.charAt(0).toUpperCase() + id.slice(1);
                    if (id && text) sections.push({ href: '#' + id, text: text });
                });
            }
            if (sections.length > 0) {
                var overlay = document.createElement('div');
                overlay.className = 'px-sheet-overlay';
                body.appendChild(overlay);
                var sheet = document.createElement('div');
                sheet.className = 'px-sheet';
                sheet.innerHTML = '<div class="px-sheet-handle"></div>';
                sections.forEach(function(s) { sheet.innerHTML += '<a href="' + s.href + '">' + s.text + '</a>'; });
                body.appendChild(sheet);
                var _pxScrollY = 0;
                function openSheet() { _pxScrollY = window.pageYOffset; overlay.classList.add('px-open'); sheet.classList.add('px-open'); body.style.overflow = 'hidden'; body.style.position = 'fixed'; body.style.top = '-' + _pxScrollY + 'px'; body.style.width = '100%'; }
                function closeSheet() { overlay.classList.remove('px-open'); sheet.classList.remove('px-open'); body.style.overflow = ''; body.style.position = ''; body.style.width = ''; body.style.top = ''; window.scrollTo(0, _pxScrollY); }
                overlay.addEventListener('click', closeSheet);
                sheet.querySelectorAll('a').forEach(function(a) {
                    a.addEventListener('click', function(e) {
                        closeSheet();
                        var target = document.querySelector(this.getAttribute('href'));
                        if (target) { e.preventDefault(); smoothScrollTo(target); }
                    });
                });
                var burger = document.getElementById('menu-burger') || document.querySelector('.menu-toggle');
                if (burger) {
                    burger.addEventListener('click', function(e) {
                        e.preventDefault(); e.stopPropagation();
                        sheet.classList.contains('px-open') ? closeSheet() : openSheet();
                    });
                }
            }
        }

        // 10. Magnetic buttons (desktop)
        if (window.matchMedia('(hover: hover)').matches) {
            document.querySelectorAll('.btn:not(.px-dock-primary)').forEach(function(btn) {
                if (btn.closest('.px-dock')) return;
                btn.classList.add('px-magnetic');
                btn.addEventListener('mousemove', function(e) {
                    var rect = btn.getBoundingClientRect();
                    btn.style.transform = 'translate(' + ((e.clientX - rect.left - rect.width/2) * 0.13) + 'px, ' + ((e.clientY - rect.top - rect.height/2) * 0.13) + 'px)';
                });
                btn.addEventListener('mouseleave', function() { btn.style.transform = 'translate(0, 0)'; });
            });
        }

        // 11. Card lift, image zoom, ripple
        document.querySelectorAll('[class*="-card"]:not(.px-card-lift), .pricing-row:not(.px-card-lift)').forEach(function(c) { c.classList.add('px-card-lift'); });
        document.querySelectorAll('.gallery-item:not(.px-img-zoom), .about-image-wrapper:not(.px-img-zoom), [class*="image-box"]:not(.px-img-zoom)').forEach(function(el) { el.classList.add('px-img-zoom'); });
        document.querySelectorAll('.menu-item, [class*="service-card"]').forEach(function(el) { el.classList.add('px-ripple'); });

        // 12. Swipeable gallery (mobile)
        if (isMobile) {
            var galleryGrid = document.getElementById('dom-gallery-grid') || document.querySelector('.gallery-grid');
            if (galleryGrid && galleryGrid.children.length > 2) galleryGrid.classList.add('px-gallery-swipe');
        }
    }

        // Force :active state recognition on mobile (iOS/Android quirk)
    document.addEventListener('touchstart', function() {}, {passive: true});

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 200); });
    } else { setTimeout(init, 200); }
})();
</script>
